#import "../gql/fragments/Image.gql"

query ArticleList {
  entries(
    section: ["article", "externalArticle"]
    orderBy: "postDate DESC"
  ) {
    title
    to: uri
    externalResourceUrl
    heroImage {
      ... on heroImage_heroImage_BlockType {
        id
        image {
          ...Image
        }
      }
    }
    description: summary
    authors: staffMember {
      title
    }
    date: postDate
    articleCategories {
      id
      title
      uri
    }
  }

  entry(section: "listingNews") {
    ... on listingNews_listingNews_Entry {
      title
      text: summary
      ... on listingNews_listingNews_Entry {
        featuredNews {
          title
          articleCategories {
            id
            title
            uri
          }
          text: summary
          to: uri
          externalResourceUrl
          heroImage {
            ... on heroImage_heroImage_BlockType {
              id
              image {
                ...Image
              }
            }
          }
          postDate
        }
      }
    }
  }
}
