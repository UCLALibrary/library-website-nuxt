#import "../gql/fragments/Image.gql"
#import "../gql/fragments/collections/AllFpb.gql"

query ProgramDetail($slug: [String!]) {
    entry(section: "program", slug: $slug) {
        id
        sectionHandle
        slug
        uri
        title
        text: summary
        heroImage {
            ... on heroImage_heroImage_BlockType {
                id
                image {
                    ...Image
                }
            }
        }
        buttonUrl {
            ... on buttonUrl_button_BlockType {
                buttonText
                buttonUrl
            }
        }
        email
        phoneNumber
        viewStaffDirectory
        department {
            id
            title
        }
        programType {
            id
            title
        }
        ...AllFpb
    }
    associatedArticles: entries(
        section: ["article", "externalArticle"]
        relatedToEntries: { section: "program", slug: $slug }
        orderBy: "dateUpdated desc"
        limit: 3
    ) {
        id
        title
        associatedArticles {
            id
            title
        }
        to: uri
        externalResourceUrl
        heroImage {
            ... on heroImage_heroImage_BlockType {
                id
                image {
                    ...Image
                }
                altText
            }
        }
        description: summary
        category: typeHandle
        startDate: dateCreated
        endDate: dateCreated
    }
}
